name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - id: pages
        uses: actions/configure-pages@v5
      - name: Configure Astro for GitHub Pages
        run: |
          SITE_URL="${{ vars.SITE_URL }}"
          BASE_PATH="${{ vars.BASE_PATH }}"
          if [ -z "$SITE_URL" ]; then SITE_URL="${{ steps.pages.outputs.origin }}"; fi
          if [ -z "$BASE_PATH" ]; then BASE_PATH="${{ steps.pages.outputs.base_path }}"; fi
          echo "SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
